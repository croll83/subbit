<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Subbit</title>
  <!-- Google Fonts for HUD -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #07200f; overflow: hidden; font-family: 'Archivo', system-ui, sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }
    
    /* ═══ CSS Variables from tokens ═══ */
    :root {
      --pitch: #1f6b3a;
      --pitch-ink: #07200f;
      --highlight: #ffd64a;
      --danger: #e14747;
      --warn: #f0a020;
      --success: #27ae60;
      --text-hi: #ffffff;
      --text-md: rgba(255,255,255,0.78);
      --text-lo: rgba(255,255,255,0.52);
      --line: rgba(255,255,255,0.12);
      --line-strong: rgba(255,255,255,0.22);
      
      --font-ui: 'Archivo', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
      --font-display: 'DM Serif Display', Georgia, serif;
      
      --ease-fast: 120ms cubic-bezier(.2,.7,.3,1);
      --ease-base: 220ms cubic-bezier(.2,.7,.3,1);
      --ease-slow: 400ms cubic-bezier(.2,.7,.3,1);
    }

    /* Rotate phone overlay */
    #rotate-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--pitch-ink);
      z-index: 9999;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      font-size: 18px;
      text-align: center;
      padding: 20px;
    }
    #rotate-overlay .icon {
      font-size: 60px;
      margin-bottom: 20px;
      animation: wiggle 1.5s ease-in-out infinite;
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-15deg); }
      50% { transform: rotate(15deg); }
    }
    @media screen and (orientation: portrait) {
      #rotate-overlay { display: flex; }
    }

    /* ═══ TOP BAR (centered: score + view toggle) ═══ */
    #top-bar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 10;
    }
    
    #score-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 12px;
      background: rgba(7,32,15,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      color: #fff;
    }
    #score-bar .flag {
      width: 14px; height: 14px;
      border-radius: 50%;
      overflow: hidden;
    }
    #score-bar .team-code {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
    }
    #score-bar .score-num {
      font-family: var(--font-ui);
      font-size: 18px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.3px;
      line-height: 1;
    }
    #score-bar .score-dash {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      margin: 0 -2px;
    }
    #score-bar .separator {
      width: 1px;
      height: 16px;
      background: rgba(255,255,255,0.18);
      margin: 0 2px;
    }
    #score-bar .half {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.55);
    }
    #score-bar .timer {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    /* ═══ VIEW TOGGLE (inside top-bar) ═══ */
    #view-toggle {
      display: flex;
      padding: 3px;
      background: rgba(7,32,15,0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
    }
    #view-toggle button {
      padding: 4px 10px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all var(--ease-fast);
    }
    #view-toggle button.active {
      background: #fff;
      color: var(--pitch-ink);
    }

    /* ═══ FLICK PILLS (above selected figure) ═══ */
    #flick-pills {
      position: absolute;
      display: none;
      gap: 4px;
      z-index: 10;
      pointer-events: none;
    }
    #flick-pills .pill {
      width: 12px;
      height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.25);
      transition: all var(--ease-fast);
    }
    #flick-pills .pill.active {
      background: var(--highlight);
      box-shadow: 0 0 8px rgba(255,214,74,0.7);
    }

    /* ═══ POWER RING (SVG overlay) ═══ */
    #power-ring {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      display: none;
    }

    /* ═══ BOTTOM BANNER ═══ */
    #bottom-banner {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 14px 7px 10px;
      background: rgba(7,32,15,0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      font-family: var(--font-ui);
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      z-index: 10;
    }
    #bottom-banner .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 4px;
      background: var(--highlight);
      box-shadow: 0 0 10px var(--highlight);
    }
    #bottom-banner .dot.pulse {
      animation: pulse 1.4s ease-in-out infinite;
    }
    #bottom-banner .accent {
      color: var(--highlight);
      font-weight: 700;
    }
    #bottom-banner .divider {
      width: 1px;
      height: 12px;
      background: rgba(255,255,255,0.2);
    }
    #bottom-banner .power-pct {
      font-family: var(--font-mono);
      font-variant-numeric: tabular-nums;
      color: var(--highlight);
      font-weight: 700;
    }
    #bottom-banner .latency {
      font-family: var(--font-mono);
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.85); }
    }

    /* ═══ GOAL CARD ═══ */
    #goal-overlay {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 70% 50%, rgba(255,214,74,0.3), transparent 60%);
      pointer-events: none;
      z-index: 30;
    }
    #goal-card {
      padding: 20px 48px;
      background: rgba(7,32,15,0.55);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,214,74,0.4);
      border-radius: 20px;
      box-shadow: 0 0 60px rgba(255,214,74,0.4);
      text-align: center;
      animation: goalPop 0.4s ease-out;
    }
    #goal-card .meta {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--highlight);
      letter-spacing: 3px;
      text-transform: uppercase;
    }
    #goal-card .title {
      font-family: var(--font-ui);
      font-size: 56px;
      font-weight: 900;
      color: #fff;
      letter-spacing: -2px;
      line-height: 1;
      margin-top: 4px;
    }
    #goal-card .subtitle {
      font-family: var(--font-ui);
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      margin-top: 6px;
    }
    #goal-card .subtitle .score-highlight {
      color: var(--highlight);
      font-weight: 700;
    }
    @keyframes goalPop {
      from { transform: scale(0.5); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    /* ═══ KEEPER SLIDER ═══ */
    #keeper-ui {
      position: absolute;
      top: 96px;
      bottom: 96px;
      width: 22px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      z-index: 20;
    }
    #keeper-ui.left { left: 22px; }
    #keeper-ui.right { right: 22px; }
    
    #keeper-track {
      flex: 1;
      width: 6px;
      position: relative;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      transition: all 200ms ease;
    }
    #keeper-ui.defending #keeper-track {
      background: rgba(225,71,71,0.2);
      border-color: rgba(225,71,71,0.5);
    }
    
    #keeper-thumb {
      position: absolute;
      width: 20px;
      height: 28px;
      border-radius: 6px;
      background: #fff;
      border: 1.5px solid var(--pitch-ink);
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      pointer-events: auto;
      transition: background 200ms ease, border 200ms ease, box-shadow 200ms ease;
      touch-action: none;
    }
    #keeper-ui.left #keeper-thumb { left: -7px; }
    #keeper-ui.right #keeper-thumb { right: -7px; }
    
    #keeper-ui.defending #keeper-thumb {
      background: var(--danger);
      border-color: #fff;
      box-shadow: 0 0 12px rgba(225,71,71,0.6), 0 2px 4px rgba(0,0,0,0.4);
    }
    
    #keeper-thumb .grip {
      width: 8px;
      height: 1px;
      background: var(--pitch-ink);
      opacity: 0.5;
    }
    #keeper-ui.defending #keeper-thumb .grip {
      background: #fff;
    }
    
    #keeper-label {
      position: absolute;
      top: -22px;
      padding: 2px 8px;
      background: var(--danger);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 8px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      white-space: nowrap;
      display: none;
    }
    #keeper-ui.defending #keeper-label {
      display: block;
    }

    /* ═══ OPPONENT TURN BADGE ═══ */
    #opponent-badge {
      position: absolute;
      top: 58px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      align-items: center;
      gap: 8px;
      padding: 5px 12px;
      background: rgba(7,32,15,0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(240,160,32,0.4);
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--warn);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      z-index: 10;
    }
    #opponent-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 3px;
      background: var(--warn);
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* Predictive line canvas overlay */
    #arrow-canvas {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 5;
    }
  </style>
</head>
<body>
  <!-- Rotate phone overlay -->
  <div id="rotate-overlay">
    <div class="icon">📱</div>
    <div>Ruota il telefono<br>per giocare</div>
  </div>

  <div id="canvas-container">
    <!-- ═══ TOP BAR (centered: score + view toggle) ═══ -->
    <div id="top-bar">
      <div id="score-bar">
        <span class="flag" id="home-flag"></span>
        <span class="team-code" id="home-code">ITA</span>
        <span class="score-num" id="home-score">0</span>
        <span class="score-dash">–</span>
        <span class="score-num" id="away-score">0</span>
        <span class="team-code" id="away-code">BRA</span>
        <span class="flag" id="away-flag"></span>
        <span class="separator"></span>
        <span class="half" id="half-label">1T</span>
        <span class="timer" id="timer-display">2:00</span>
      </div>
      <div id="view-toggle">
        <button id="btn-2d" class="active">2D</button>
        <button id="btn-3d">3D</button>
      </div>
    </div>

    <!-- ═══ FLICK PILLS ═══ -->
    <div id="flick-pills">
      <div class="pill"></div>
      <div class="pill"></div>
      <div class="pill"></div>
    </div>

    <!-- ═══ POWER RING (SVG) ═══ -->
    <svg id="power-ring" width="100%" height="100%">
      <defs>
        <linearGradient id="pwrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#27ae60" />
          <stop offset="50%" stop-color="#ffd64a" />
          <stop offset="100%" stop-color="#e14747" />
        </linearGradient>
      </defs>
      <circle id="pwr-bg" cx="0" cy="0" r="24" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="3"/>
      <circle id="pwr-fg" cx="0" cy="0" r="24" fill="none" stroke="url(#pwrGrad)" stroke-width="3"
        stroke-dasharray="0 151" stroke-linecap="round"/>
    </svg>

    <!-- ═══ BOTTOM BANNER ═══ -->
    <div id="bottom-banner">
      <span class="dot pulse"></span>
      <span id="banner-text">Il tuo turno — <span class="accent">tocca una pedina</span></span>
    </div>

    <!-- ═══ GOAL OVERLAY ═══ -->
    <div id="goal-overlay">
      <div id="goal-card">
        <div class="meta" id="goal-meta">78' · 2° TEMPO</div>
        <div class="title" id="goal-title">GOAL</div>
        <div class="subtitle" id="goal-teams">Italia <span class="score-highlight" id="goal-score">1</span> – 0 Brasile</div>
      </div>
    </div>

    <!-- ═══ KEEPER SLIDER ═══ -->
    <div id="keeper-ui" class="left">
      <div id="keeper-label">DEFEND</div>
      <div id="keeper-track">
        <div id="keeper-thumb" style="top: 50%; transform: translateY(-50%);">
          <div class="grip"></div>
          <div class="grip"></div>
          <div class="grip"></div>
        </div>
      </div>
    </div>

    <!-- ═══ OPPONENT TURN BADGE ═══ -->
    <div id="opponent-badge">
      <div class="dot"></div>
      Opponent playing
    </div>

    <!-- Predictive arrow canvas -->
    <canvas id="arrow-canvas"></canvas>
  </div>

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script>
    // Initialize TMA when ready
    function initTMA() {
      if (!window.Telegram || !Telegram.WebApp) {
        console.log('[TMA] Not running in Telegram');
        return;
      }
      
      const tg = Telegram.WebApp;
      console.log('[TMA] Version:', tg.version);
      
      tg.ready();
      tg.expand();
      
      // Disable swipe to close first
      if (tg.disableVerticalSwipes) {
        tg.disableVerticalSwipes();
        console.log('[TMA] Disabled vertical swipes');
      }
      
      // Request fullscreen (TMA 8.0+)
      try {
        if (tg.requestFullscreen && tg.version && parseFloat(tg.version) >= 8.0) {
          tg.requestFullscreen();
          console.log('[TMA] Requested fullscreen');
        }
      } catch (e) {
        console.log('[TMA] Fullscreen not supported:', e.message);
      }
      
      // lockOrientation() locks CURRENT orientation, doesn't force landscape
      // We need to wait until user rotates to landscape, then lock it
      console.log('[TMA] Ready - rotate phone to landscape to play');
    }
    
    // Run on DOMContentLoaded
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initTMA);
    } else {
      initTMA();
    }
    
    // Lock orientation when user rotates to landscape
    let orientationLocked = false;
    function checkAndLockLandscape() {
      if (orientationLocked) return;
      
      const isLandscape = window.innerWidth > window.innerHeight;
      if (isLandscape && window.Telegram && Telegram.WebApp && Telegram.WebApp.lockOrientation) {
        Telegram.WebApp.lockOrientation();
        orientationLocked = true;
        console.log('[TMA] Locked orientation in landscape!');
      }
    }
    
    window.addEventListener('resize', checkAndLockLandscape);
    window.addEventListener('orientationchange', () => {
      setTimeout(checkAndLockLandscape, 100);
    });
  </script>

  <!-- Three.js + Rapier via CDN -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="main.js?v=15"></script>
</body>
</html>
